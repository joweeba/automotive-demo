<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LFM Vehicle Demo — Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-app:#0F0F0F; --bg-subtle:#161616;
    --border-subtle:rgba(255,255,255,0.06); --border-normal:rgba(255,255,255,0.10);
    --text-primary:rgba(255,255,255,0.90); --text-secondary:rgba(255,255,255,0.50);
    --text-tertiary:rgba(255,255,255,0.30);
    --accent-text:#A593FF; --accent-solid:#7C6AFF;
    --selected-bg:rgba(94,74,227,0.12); --selected-border:rgba(165,147,255,0.35);
    --hover-overlay:rgba(255,255,255,0.04);
    --radius-md:6px; --radius-lg:8px;
    --font-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; overflow:hidden; background:var(--bg-app); color:var(--text-primary);
    font-family:var(--font-sans); font-size:13px; -webkit-font-smoothing:antialiased; }
  #app { display:flex; height:100%; }
  #panel { width:236px; flex-shrink:0; background:var(--bg-subtle);
    border-right:1px solid var(--border-subtle); display:flex; flex-direction:column; }
  #panel header { padding:14px 16px 12px; border-bottom:1px solid var(--border-subtle); }
  #panel header h1 { font-size:13px; font-weight:600; letter-spacing:-0.01em; }
  #panel header p { font-size:11px; color:var(--text-tertiary); margin-top:2px; }
  #controls { flex:1; overflow-y:auto; padding:8px; }
  .section { padding:8px 8px 4px; }
  .section-label { font-size:11px; font-weight:500; color:var(--text-tertiary);
    text-transform:uppercase; letter-spacing:0.04em; padding:0 4px 6px; }
  .row { display:flex; gap:4px; flex-wrap:wrap; }
  button { font-family:var(--font-sans); font-size:12px; font-weight:500;
    color:var(--text-secondary); background:transparent; border:1px solid var(--border-normal);
    border-radius:var(--radius-md); padding:5px 10px; cursor:pointer;
    transition:background 100ms ease, color 100ms ease, border-color 100ms ease; }
  button:hover { background:var(--hover-overlay); color:var(--text-primary); }
  button.active { background:var(--selected-bg); border-color:var(--selected-border); color:var(--accent-text); }
  button:disabled { opacity:0.35; cursor:default; }
  button.block { width:100%; text-align:left; margin-bottom:4px; }
  #status { padding:10px 16px; border-top:1px solid var(--border-subtle);
    font-family:var(--font-mono); font-size:10.5px; color:var(--text-tertiary);
    line-height:1.5; min-height:52px; }
  #status .ok { color:var(--accent-text); }
  #viewport { flex:1; position:relative; }
  canvas { display:block; }
  #drop { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--bg-app); z-index:10; }
  #drop.hidden { display:none; }
  #drop .card { border:1px dashed var(--border-normal); border-radius:var(--radius-lg);
    padding:40px 56px; text-align:center; transition:border-color 120ms ease, background 120ms ease; }
  #drop.over .card { border-color:var(--accent-solid); background:var(--selected-bg); }
  #drop h2 { font-size:14px; font-weight:600; margin-bottom:6px; }
  #drop p { font-size:12px; color:var(--text-secondary); margin-bottom:16px; }
  #drop label { display:inline-block; background:var(--accent-solid); color:#0F0F0F;
    font-weight:500; font-size:12px; border-radius:var(--radius-md); padding:6px 14px; cursor:pointer; }
  #drop input { display:none; }
  #countdown { position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    pointer-events:none; z-index:20; font-family:var(--font-display,'Inter'); }
  #countdown.show { display:flex; }
  #countdown span { font-size:96px; font-weight:600; color:var(--text-primary); opacity:0.9;
    letter-spacing:-0.02em; }
  #rec-dot { display:inline-block; width:7px; height:7px; border-radius:50%;
    background:#EF4444; margin-right:6px; vertical-align:1px;
    animation:pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  button.recording { border-color:rgba(239,68,68,0.5); color:#EF4444; }
</style>
</head>
<body>
<div id="app">
  <div id="panel">
    <header>
      <h1>Vehicle Demo Viewer</h1>
      <p>sedan_animated.glb</p>
    </header>
    <div id="controls">
      <div class="section">
        <div class="section-label">View</div>
        <div class="row">
          <button data-view="threeq" class="active">3/4</button>
          <button data-view="top">Top</button>
          <button data-view="side">Side</button>
          <button data-view="cabin">Cabin</button>
        </div>
      </div>
      <div class="section">
        <div class="section-label">Exterior</div>
        <button class="block" id="btn-frunk">Open frunk</button>
        <button class="block" id="btn-trunk">Open trunk</button>
        <button class="block" id="btn-wipers">Wipers on</button>
        <div class="row" style="margin-top:2px">
          <button id="btn-head">Headlights</button>
          <button id="btn-tail">Taillights</button>
          <button id="btn-fog">Fog lights</button>
        </div>
      </div>
      <div class="section">
        <div class="section-label">Interior · cabin view</div>
        <button class="block" id="btn-ac">A/C on</button>
        <button class="block" id="btn-heat">Heater on</button>
        <button class="block" id="btn-seat-driver">Driver seat: off</button>
        <button class="block" id="btn-seat-passenger">Passenger seat: off</button>
        <button class="block" id="btn-seat-rear">Rear seat: off</button>
      </div>
      <div class="section">
        <div class="section-label">Body</div>
        <button class="block" id="btn-roof">Remove roof</button>
        <button class="block" id="btn-glass">Hide glass</button>
      </div>
      <div class="section">
        <div class="section-label">Style</div>
        <button class="block" id="btn-schematic">Schematic mode</button>
      </div>
      <div class="section">
        <div class="section-label">Animation</div>
        <button class="block" id="btn-showcase" disabled>Play baked showcase</button>
      </div>
      <div class="section">
        <div class="section-label">Capture</div>
        <button class="block" id="btn-snap">Snapshot PNG</button>
        <button class="block" id="btn-rec">Record GIF</button>
      </div>
    </div>
    <div id="status">waiting for model…</div>
  </div>
  <div id="viewport">
    <div id="countdown"><span></span></div>
    <div id="drop">
      <div class="card">
        <h2>Drop the car .glb here</h2>
        <p>sedan_animated.glb</p>
        <label>Browse<input type="file" id="file" accept=".glb"></label>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>

let center = new THREE.Vector3(0, 0.7, 0), centerTarget = center.clone();
let sph = { ...CONFIG.views.threeq }, sphTarget = { ...CONFIG.views.threeq };
renderer.domElement.addEventListener('pointerdown', e => {
  const sx = e.clientX, sy = e.clientY, s0 = { ...sphTarget };
  const move = ev => {
    sphTarget.theta = s0.theta - (ev.clientX - sx) * 0.006;
    sphTarget.phi = Math.min(Math.PI - 0.15, Math.max(0.10, s0.phi - (ev.clientY - sy) * 0.006));
  };
  const up = () => { removeEventListener('pointermove', move); removeEventListener('pointerup', up); };
  addEventListener('pointermove', move); addEventListener('pointerup', up);
});
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  sphTarget.r = Math.min(20, Math.max(1.1, sphTarget.r * (1 + e.deltaY * 0.0012)));
}, { passive: false });
function applyCamera(dt) {
  const k = 1 - Math.pow(0.0001, dt);
  sph.r += (sphTarget.r - sph.r) * k;
  sph.theta += (sphTarget.theta - sph.theta) * k;
  sph.phi += (sphTarget.phi - sph.phi) * k;
  center.lerp(centerTarget, k);
  camera.position.set(
    center.x + sph.r * Math.sin(sph.phi) * Math.sin(sph.theta),
    center.y + sph.r * Math.cos(sph.phi),
    center.z + sph.r * Math.sin(sph.phi) * Math.cos(sph.theta));
  camera.lookAt(center);
}

// ---------- model load ----------
function loadModel(buffer) {
  new THREE.GLTFLoader().parse(buffer, '', gltf => {
    if (root) scene.remove(root);
    root = gltf.scene; scene.add(root);
    roofParts = []; glassParts = []; headParts = []; tailParts = [];
    pivHood = pivTail = pivWipL = pivWipR = null;

    root.traverse(o => {
      const n = o.name || '';
      if (n === 'PIVOT_hood') pivHood = o;
      if (n === 'PIVOT_trunk') pivTail = o;
      if (n === 'PIVOT_wiper_L') pivWipL = o;
      if (n === 'PIVOT_wiper_R') pivWipR = o;
      if (o.isMesh) {
        if (ROOF_NAMES.some(r => n.startsWith(r))) { o.material = o.material.clone(); o.material.transparent = true; roofParts.push(o); }
        if (n.includes('GLASS') || n.includes('__glass')) glassParts.push(o);
        if (HEAD_NAMES.some(h => n.startsWith(h))) { o.material = o.material.clone(); headParts.push(o); }
        if (TAIL_NAMES.some(t2 => n.startsWith(t2))) { o.material = o.material.clone(); tailParts.push(o); }
        o.userData.baseMat = o.material;
      }
    });

    // fallback hinges if a raw (unrigged) file is dropped
    if (!pivHood) pivHood = runtimeHinge('HOOD__panel', CONFIG.hingePos.hood);
    if (!pivTail) pivTail = runtimeHingeMulti(n => n.startsWith('TRUNK'), CONFIG.hingePos.tailgate, 'PIVOT_trunk');
    if (!pivWipL) pivWipL = runtimeHinge('WIPER_L', CONFIG.hingePos.wiper_L);
    if (!pivWipR) pivWipR = runtimeHinge('WIPER_R', CONFIG.hingePos.wiper_R);

    const box = new THREE.Box3().setFromObject(root);
    box.getCenter(centerTarget); center.copy(centerTarget);

    if (gltf.animations && gltf.animations.length) {
      mixer = new THREE.AnimationMixer(root);
      showcaseClip = gltf.animations[0];
      document.getElementById('btn-showcase').disabled = false;
    }
    makeBeams(); makeClimate(); makeSeatSprites();
    document.getElementById('drop').classList.add('hidden');
    setStatus(`<span class="ok">model loaded</span><br>hood ${pivHood?'✓':'✗'} · trunk ${pivTail?'✓':'✗'} · wipers ${pivWipL&&pivWipR?'✓':'✗'}`);
  }, err => setStatus('failed to parse GLB: ' + err));
}
function runtimeHinge(meshName, pos) {
  let target = null;
  root.traverse(o => { if (o.isMesh && (o.name||'').startsWith(meshName)) target = o; });
  if (!target) return null;
  const p = new THREE.Object3D(); p.position.fromArray(pos); root.add(p); p.attach(target); return p;
}
function runtimeHingeMulti(match, pos, name) {
  const parts = [];
  root.traverse(o => { if (o.isMesh && match(o.name || '')) parts.push(o); });
  if (!parts.length) return null;
  const p = new THREE.Object3D(); p.name = name; p.position.fromArray(pos); root.add(p);
  parts.forEach(m => p.attach(m)); return p;
}

// ---------- soft dissolving light beams ----------
function beamTexture() {
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 512;
  const ctx = cv.getContext('2d');
  const g1 = ctx.createRadialGradient(128, 14, 6, 128, 14, 500);
  g1.addColorStop(0, 'rgba(255,255,255,0.85)');
  g1.addColorStop(0.35, 'rgba(255,255,255,0.28)');
  g1.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, 256, 512);
  ctx.globalCompositeOperation = 'destination-in';
  ctx.filter = 'blur(26px)';
  ctx.beginPath();                       // soft cone mask, apex at source
  ctx.moveTo(128, -8); ctx.lineTo(20, 520); ctx.lineTo(236, 520); ctx.closePath();
  ctx.fillStyle = '#fff'; ctx.fill();
  return new THREE.CanvasTexture(cv);
}
function glowTexture() {
  const cv = document.createElement('canvas'); cv.width = cv.height = 128;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 2, 64, 64, 62);
  g.addColorStop(0, 'rgba(255,255,255,0.9)'); g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(cv);
}
let beamGroup = null;
function makeBeams() {
  if (beamGroup) scene.remove(beamGroup);
  beamGroup = new THREE.Group(); scene.add(beamGroup);
  beamMats = []; tailMats = []; fogMats = [];
  const bt = beamTexture(), gt = glowTexture();
  function beamPair(x, y, z, len, wid, color, maxO, dir, mats) {
    for (const roll of [0, Math.PI / 2]) {          // flat + upright cross
      const m = new THREE.Mesh(
        new THREE.PlaneGeometry(wid, len),
        new THREE.MeshBasicMaterial({ map: bt, color, transparent: true, opacity: 0,
          blending: THREE.AdditiveBlending, depthWrite: false, side: THREE.DoubleSide }));
      m.rotation.x = dir > 0 ? -Math.PI / 2 : Math.PI / 2;   // source end at the lamp
      m.rotateOnWorldAxis(new THREE.Vector3(0, 0, 1), roll);
      m.position.set(x, y, z + dir * len / 2);
      m.material.userData = { max: maxO };
      beamGroup.add(m); mats.push(m.material);
    }
    const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: gt, color, transparent: true,
      opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false }));
    s.position.set(x, y, z); s.scale.setScalar(0.55);
    s.material.userData = { max: Math.min(1, maxO * 2) };
    beamGroup.add(s); mats.push(s.material);
  }
  CONFIG.headlights.forEach(([x, y, z]) =>
    beamPair(x, y, z, CONFIG.beams.length, CONFIG.beams.width, CONFIG.headGlow, CONFIG.beams.maxOpacity, +1, beamMats));
  CONFIG.beams.tailPositions.forEach(([x, y, z]) =>
    beamPair(x, y, z, CONFIG.beams.tailLength, CONFIG.beams.tailWidth, CONFIG.taillightColor, CONFIG.beams.tailMax, -1, tailMats));
  fogMats = [];
  CONFIG.beams.fog.positions.forEach(([x, y, z]) =>
    beamPair(x, y, z, CONFIG.beams.fog.length, CONFIG.beams.fog.width, CONFIG.beams.fog.color, CONFIG.beams.fog.max, +1, fogMats));
}

// ---------- climate: cabin glow ----------
function cabinGlowTexture() {
  // elongated radial falloff: bright at the dash end, dissolves to nothing — no straight edges
  const cv = document.createElement('canvas'); cv.width = 256; cv.height = 512;
  const ctx = cv.getContext('2d');
  ctx.translate(128, 78);
  ctx.scale(1, 2.75);
  const g = ctx.createRadialGradient(0, 0, 8, 0, 0, 165);
  g.addColorStop(0.0, 'rgba(255,255,255,0.95)');
  g.addColorStop(0.45, 'rgba(255,255,255,0.42)');
  g.addColorStop(0.8, 'rgba(255,255,255,0.10)');
  g.addColorStop(1.0, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fillRect(-128, -30, 256, 220);
  return new THREE.CanvasTexture(cv);
}
function makeClimate() {
  if (climate) scene.remove(climate.group);
  const z = CONFIG.climate.zone;
  const group = new THREE.Group(); scene.add(group);
  const tex = cabinGlowTexture();
  function layer(blending, yOff, scale) {
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(z.w * scale, z.l * scale),
      new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0,
        blending, depthWrite: false, side: THREE.DoubleSide }));
    m.rotation.x = -Math.PI / 2;
    // bright end of the texture sits at the dash (+Z)
    m.position.set(z.cx, z.y + yOff, z.cz);
    group.add(m);
    return m;
  }
  const windTex = { heat: windTextures.heat, ac: windTextures.ac };
  const wind = [];
  CONFIG.climate.wind.emitters.forEach(e => {
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(e.w, e.l),
      new THREE.MeshBasicMaterial({ map: windTex.heat, transparent: true, opacity: 0,
        depthWrite: false, side: THREE.DoubleSide }));
    m.rotation.x = -Math.PI / 2;
    m.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), Math.PI);   // dense end faces the vent
    m.position.set(e.x, z.y + 0.08, e.z);
    group.add(m); wind.push(m);
  });
  climate = { group,
    tint: layer(THREE.NormalBlending, 0, 1.0),      // deep saturating wash
    glow: layer(THREE.AdditiveBlending, 0.05, 0.82), // luminous core nearer the dash
    wind, mode: 'heat'
  };
}
const windTextures = {};
{
  const loader = new THREE.TextureLoader();
  windTextures.heat = loader.load(WIND_PNG.heat);
  windTextures.ac = loader.load(WIND_PNG.ac);
}
function updateClimate(dt) {
  if (!climate) return;
  const on = st.climate !== 'off';
  const col = st.climate === 'heat' ? CONFIG.climate.heatColor : CONFIG.climate.acColor;
  climate.tint.material.color.setHex(col);
  climate.glow.material.color.setHex(col);
  const breathe = 0.92 + 0.08 * Math.sin(performance.now() * 0.0013);
  const k = Math.min(1, dt * 4);
  climate.tint.material.opacity += ((on ? CONFIG.climate.tintMax * breathe : 0) - climate.tint.material.opacity) * k;
  climate.glow.material.opacity += ((on ? CONFIG.climate.glowMax * breathe : 0) - climate.glow.material.opacity) * k;
  // wind puffs: drift away from the vent while fading in and out
  if (st.climate !== 'off' && climate.mode !== st.climate) {
    climate.mode = st.climate;
    const t = st.climate === 'heat' ? windTextures.heat : windTextures.ac;
    climate.wind.forEach(m => { m.material.map = t; m.material.needsUpdate = true; });
  }
  climate.wind.forEach(m => {
    m.material.opacity += ((on ? CONFIG.climate.wind.max : 0) - m.material.opacity) * Math.min(1, dt * 4);
  });
}

  tog('btn-heat', st.climate === 'heat', 'Heater off', 'Heater on');
  tog('btn-ac', false, null, 'A/C on'); document.getElementById('btn-ac').textContent = 'A/C on';
};
['driver', 'passenger', 'rear'].forEach(id => {
  document.getElementById('btn-seat-' + id).onclick = () => {
    st.seats[id] = (st.seats[id] + 1) % 4;
    applySeatLevel(id);
  };
});
document.getElementById('btn-schematic').onclick = () => {
  st.schematic = !st.schematic;
  root && root.traverse(o => { if (o.isMesh) o.material = st.schematic ? SCHEM[classify(o.name || '')] : o.userData.baseMat; });
  tog('btn-schematic', st.schematic);
};
document.getElementById('btn-showcase').onclick = () => {
  if (!mixer || !showcaseClip) return;
  playingShowcase = true;
  mixer.stopAllAction();
  const a = mixer.clipAction(showcaseClip);
  a.setLoop(THREE.LoopOnce); a.clampWhenFinished = true; a.reset().play();
  mixer.addEventListener('finished', function onF() {
    mixer.removeEventListener('finished', onF);
    playingShowcase = false;
    st.frunk = st.frunkT = 1; st.trunk = st.trunkT = 1; st.roof = st.roofT = 1;
    tog('btn-frunk', 1, 'Close frunk', 'Open frunk');
    tog('btn-trunk', 1, 'Close trunk', 'Open trunk');
    tog('btn-roof', 1, 'Restore roof', 'Remove roof');
  });
};
document.querySelectorAll('[data-view]').forEach(b => b.onclick = () => {
  document.querySelectorAll('[data-view]').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  Object.assign(sphTarget, CONFIG.views[b.dataset.view]);
  if (b.dataset.view === 'cabin') {                       // auto-open the cabin
    if (!st.roofT) { st.roofT = 1; tog('btn-roof', 1, 'Restore roof', 'Remove roof'); st.autoCabin = true; }
    if (!st.glassHidden) document.getElementById('btn-glass').onclick();
  } else if (st.autoCabin) {
    st.autoCabin = false;
    st.roofT = 0; tog('btn-roof', 0, 'Restore roof', 'Remove roof');
    if (st.glassHidden) document.getElementById('btn-glass').onclick();
  }
});

// ---------- file loading ----------
const drop = document.getElementById('drop');
document.getElementById('file').addEventListener('change', e => {
  const f = e.target.files[0]; if (f) f.arrayBuffer().then(loadModel);
});
['dragover','dragenter'].forEach(ev => addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f && f.name.endsWith('.glb')) f.arrayBuffer().then(loadModel);
});

// ---------- capture: PNG snapshot + GIF recording ----------
const cap = { mode: 'idle', gif: null, workerURL: null, lastFrame: 0,
              startT: 0, w: 0, h: 0, tmp: document.createElement('canvas') };
const GIF_FPS = 12, GIF_MAX_S = 12, GIF_MAX_W = 640, KEY = 0x00FF00;
const cdEl = document.getElementById('countdown');

function renderTransparent() {
  const bg = scene.background;
  scene.background = null;
  renderer.render(scene, camera);
  scene.background = bg;
}
function download(url, name) {
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
}
document.getElementById('btn-snap').onclick = () => {
  if (!root) return;
  renderTransparent();
  download(renderer.domElement.toDataURL('image/png'), 'car_snapshot.png');
  renderer.render(scene, camera);
  setStatus('<span class="ok">snapshot saved</span> — transparent PNG');
};

async function getWorkerURL() {
  if (cap.workerURL) return cap.workerURL;
  const txt = await fetch('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js').then(r => r.text());
  cap.workerURL = URL.createObjectURL(new Blob([txt], { type: 'application/javascript' }));
  return cap.workerURL;
}
document.getElementById('btn-rec').onclick = async () => {
  const btn = document.getElementById('btn-rec');
  if (cap.mode === 'recording') { finishGif(); return; }
  if (cap.mode !== 'idle' || !root) return;
  if (typeof GIF === 'undefined') { setStatus('gif.js failed to load — check internet connection'); return; }
  let workerURL;
  try { workerURL = await getWorkerURL(); }
  catch (e) { setStatus('could not fetch gif worker — check internet connection'); return; }

  cap.mode = 'countdown'; btn.disabled = true;
  for (const n of ['3', '2', '1']) {
    cdEl.querySelector('span').textContent = n;
    cdEl.classList.add('show');
    await new Promise(r => setTimeout(r, 1000));
  }
  cdEl.classList.remove('show');

  const scale = Math.min(1, GIF_MAX_W / renderer.domElement.width);
  cap.w = Math.round(renderer.domElement.width * scale);
  cap.h = Math.round(renderer.domElement.height * scale);
  cap.tmp.width = cap.w; cap.tmp.height = cap.h;
  cap.gif = new GIF({ workers: 2, quality: 10, width: cap.w, height: cap.h,
                      transparent: KEY, workerScript: workerURL });
  cap.gif.on('progress', p => setStatus(`encoding gif… ${Math.round(p * 100)}%`));
  cap.gif.on('finished', blob => {
    download(URL.createObjectURL(blob), 'car_recording.gif');
    setStatus('<span class="ok">gif saved</span>');
    cap.gif = null;
  });
  cap.mode = 'recording'; cap.startT = performance.now(); cap.lastFrame = 0;
  btn.disabled = false; btn.classList.add('recording');
  btn.innerHTML = '<span id="rec-dot"></span>Stop recording';
};
function captureGifFrame() {
  renderTransparent();
  const ctx = cap.tmp.getContext('2d');
  ctx.clearRect(0, 0, cap.w, cap.h);
  ctx.drawImage(renderer.domElement, 0, 0, cap.w, cap.h);
  const img = ctx.getImageData(0, 0, cap.w, cap.h);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    if (d[i + 3] < 128) { d[i] = 0; d[i + 1] = 255; d[i + 2] = 0; d[i + 3] = 255; }
    else d[i + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  cap.gif.addFrame(cap.tmp, { copy: true, delay: Math.round(1000 / GIF_FPS) });
}
function finishGif() {
  cap.mode = 'encoding';
  const btn = document.getElementById('btn-rec');
  btn.classList.remove('recording'); btn.textContent = 'Record GIF';
  setStatus('encoding gif…');
  cap.gif.render();
  cap.mode = 'idle';
}

// ---------- render loop ----------
const AX = new THREE.Vector3(1, 0, 0);
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (playingShowcase && mixer) {
    mixer.update(dt);
  } else if (root) {
    const k = 1 - Math.pow(0.002, dt);
    st.frunk += (st.frunkT - st.frunk) * k;
    st.trunk += (st.trunkT - st.trunk) * k;
    st.roof += (st.roofT - st.roof) * k;
    if (pivHood) pivHood.quaternion.setFromAxisAngle(AX, THREE.MathUtils.degToRad(CONFIG.openAngles.hood) * st.frunk);
    if (pivTail) pivTail.quaternion.setFromAxisAngle(AX, THREE.MathUtils.degToRad(CONFIG.openAngles.tailgate) * st.trunk);
    if (st.wipers) st.wiperPhase += dt * CONFIG.wiperSpeed;
    else st.wiperPhase += (Math.ceil(st.wiperPhase / Math.PI) * Math.PI - st.wiperPhase) * Math.min(1, dt * 5); // park
    const sweep = -THREE.MathUtils.degToRad(CONFIG.wiperSweepDeg) * 0.5 * (1 - Math.cos(st.wiperPhase));
    if (pivWipL) pivWipL.quaternion.setFromAxisAngle(WS_N, sweep);
    if (pivWipR) pivWipR.quaternion.setFromAxisAngle(WS_N, sweep);
    roofParts.forEach(m => {
      m.position.y = 0.65 * st.roof;
      m.material.opacity = 1 - st.roof;
      m.visible = st.roof < 0.98;
    });
    const bk = Math.min(1, dt * 4);
    beamMats.forEach(m => m.opacity += ((st.head ? m.userData.max : 0) - m.opacity) * bk);
    tailMats.forEach(m => m.opacity += ((st.tail ? m.userData.max : 0) - m.opacity) * bk);
    fogMats.forEach(m => m.opacity += ((st.fog ? m.userData.max : 0) - m.opacity) * bk);
    updateClimate(dt);
  }
  applyCamera(dt);
  renderer.render(scene, camera);
  if (cap.mode === 'recording') {
    const now = performance.now();
    if (now - cap.lastFrame >= 1000 / GIF_FPS) {
      cap.lastFrame = now;
      captureGifFrame();
      renderer.render(scene, camera);          // restore on-screen frame
    }
    if ((now - cap.startT) / 1000 > GIF_MAX_S) finishGif();
  }
}
animate();
</script>
</body>
